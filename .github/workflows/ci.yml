name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qa-gates:
    # runs-on: macos-latest
    runs-on: [self-hosted]
    env:
      CI: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4.1"

      - name: List available simulators
        run: |
          echo "=== Available iOS Simulators ==="
          xcrun simctl list devices iPhone | grep -E '^\s+\(' || echo "No iPhone simulators found"
          echo ""
          echo "=== All Simulators ==="
          xcrun simctl list devices

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: |
          # Retry up to 3 times to handle transient network failures
          for attempt in 1 2 3; do
            echo "Install attempt $attempt/3..."
            if make install; then
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "Install failed, waiting 10s before retry..."
              sleep 10
            fi
          done
          echo "Install failed after 3 attempts"
          exit 1

      - name: Generate Xcode project
        run: |
          make generate

      - name: Run QA Gates
        run: |
          make qa-gates

      - name: Check coverage (informational)
        continue-on-error: true
        run: |
          make coverage

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: build/
          if-no-files-found: ignore
